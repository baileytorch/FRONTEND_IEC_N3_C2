<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Inicial</title>
    <link rel="stylesheet" href="/css/bootstrap-slate.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="./assets/images/cactus.ico" type="image/x-icon">

    <script src="/js/bootstrap.min.js"></script>
    <script src="./js/procesar_form.js"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col">Navegacion...</div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col col-3"></div>
            <div class="col col-9">
                <form action="" method="post">
                    <div class="row">
                        <div class="col">
                            <h3>Formulario Registro</h3>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="input_nombre" class="form-label">Nombre:</label>
                            <input type="text" class="form-control" name="" id="input_nombre"
                                placeholder="Ingrese nombre usuario" required>
                        </div>
                        <div class="col">
                            <label for="input_rut" class="form-label">RUT:</label>
                            <input type="text" class="form-control" name="" id="input_rut"
                                placeholder="Ingrese RUT usuario" required>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="input_email" class="form-label">Email:</label>
                            <input type="email" class="form-control" name="" id="input_email"
                                placeholder="Ingrese email usuario" required>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="inputFechaNac" class="form-label">Fecha Nacimiento:</label>
                            <input type="date" class="form-control" id="inputFechaNac" name="" required>
                        </div>

                        <div class="col">
                            <p>Seleccione Género:</p>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="radioGenero" id="radioMasc" value="M" required checked>
                                <label class="form-check-label" for="radioMasc">
                                    Masculino
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="radioGenero" id="radioFem" value="F" required>
                                <label class="form-check-label" for="radioFem">
                                    Femenino
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="radioGenero" id="radioOtro" value="O" required>
                                <label class="form-check-label" for="radioOtro">
                                    Otro
                                </label>
                            </div>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="input_contrasena" class="form-label">Contraseña:</label>
                            <input type="password" class="form-control" name="" id="input_contrasena"
                                placeholder="Ingrese contraseña">
                        </div>
                        <div class="col">
                            <label for="input_confirm_contrasena" class="form-label">Confirme Contraseña:</label>
                            <input type="password" class="form-control" name="" id="input_confirm_contrasena"
                                placeholder="Ingrese RUT usuario">
                        </div>

                    </div>

                    <br>
                    <div class="row">
                        <div class="col"></div>
                        <div class="col">
                            <input type="button" class="btn btn-secondary" value="Cancelar">
                            <button type="button" onclick="validarFormulario()" class="btn btn-primary">Enviar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
<script>
    // alert('Trabajando con FORM...')
</script>

</html>
