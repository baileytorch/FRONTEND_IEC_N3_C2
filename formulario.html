<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Inicial</title>
    <link rel="stylesheet" href="/css/brite.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="./assets/images/cactus.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/estilos_formulario.css">

    <script src="/js/bootstrap.min.js"></script>
    <script src="./js/procesar_form.js"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col">Navegacion...</div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col col-3"></div>
            <div class="col col-9">
                <form action="" method="post">
                    <div class="row">
                        <div class="col">
                            <h3>Formulario Registro</h3>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="input_nombre" class="form-label">Nombre:</label>
                            <input type="text" class="form-control" name="" id="input_nombre"
                                placeholder="Ingrese nombre usuario" onchange="validarInput(this)">
                            <div class="alert alert-danger" role="alert" id="alertaNombre"></div>
                        </div>
                        <div class="col">
                            <label for="input_rut" class="form-label">RUT:</label>
                            <input type="text" class="form-control" name="" id="input_rut"
                                placeholder="Ingrese RUT usuario" onchange="validarRut(this)">
                            <div class="alert alert-danger" role="alert" id="alertaRut"></div>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="input_email" class="form-label">Email:</label>
                            <input type="email" class="form-control" name="" id="input_email"
                                placeholder="Ingrese email usuario" onchange="validarEmail(this)">
                            <div class="alert alert-danger" role="alert"  id="alertaEmail"></div>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="inputFechaNac" class="form-label">Fecha Nacimiento:</label>
                            <input type="date" class="form-control" id="inputFechaNac" name=""
                                onchange="validarInput(this)">
                            <div class="alert alert-danger" role="alert"  id="alertaFechaNacimiento"></div>
                        </div>

                        <div class="col">
                            <label for="selectGenero" class="form-label">Género:</label>
                            <select name="genero" id="selectGenero" class="form-select">
                                <option value="" selected>Seleccione su género</option>
                                <option value="F">Femenino</option>
                                <option value="M">Masculino</option>
                                <option value="O">Otro</option>
                            </select>
                            <div class="alert alert-danger" role="alert"  id="alertaGenero"></div>
                        </div>
                    </div>
                    <br>

                    <div class="row">
                        <div class="col">
                            <label for="input_contrasena" class="form-label">Contraseña:</label>
                            <input type="password" class="form-control" name="" id="input_contrasena"
                                placeholder="Ingrese contraseña" onchange="validarContraseñaSegura(this)">
                            <div class="alert alert-danger" role="alert" id="alertaContrasena"></div>
                        </div>

                        <div class="col">
                            <label for="input_confirm_contrasena" class="form-label">Confirme Contraseña:</label>
                            <input type="password" class="form-control" name="" id="input_confirm_contrasena"
                                placeholder="Ingrese nuevamente la contraseña"
                                onchange="validarRepetirContrasena(this,campoContrasena)">
                            <div class="alert alert-danger" role="alert" id="alertaRepetirContrasena"></div>
                        </div>

                    </div>

                    <br>
                    <div class="row">
                        <div class="col d-flex justify-content-end">
                            <button type="button" class="btn btn-secondary me-2">Cancelar</button>
                            <button type="button" onclick="validarFormulario()" class="btn btn-primary">Enviar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
<script>
    let campoContrasena = document.getElementById('input_contrasena');
    // alert('Trabajando con FORM...')
</script>

</html>
